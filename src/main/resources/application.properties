### Application ###
spring.application.name=TwPersonaAI

### Local environment overrides ###
spring.config.import=optional:file:.env.local.properties

### SQLite datasource ###
spring.datasource.url=jdbc:sqlite:database2.db
spring.datasource.driver-class-name=org.sqlite.JDBC

### JPA / Hibernate ###
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

### LM Studio ###
spring.ai.openai.base-url=http://localhost:1234
spring.ai.openai.api-key=dummy

### TW ###
twitch.oauth=${TWITCH_OAUTH:}
twitch.channel=${TWITCH_CHANNEL:}

